model:
  base_model: "Qwen/Qwen3.5-9B"

working_memory:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  learning_rate: 5.0e-4
  online_update_steps: 3

long_term_memory:
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.02
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  consolidation_lr: 1.0e-4
  consolidation_epochs: 3
  max_memory_buffer: 5000

consolidation:
  beta: 1.0
  gamma: 0.0

training:
  max_seq_length: 2048
  checkpoint_interval: 20

streaming:
  session_length: 20
  num_sessions: 100

# evaluation: documentation-only — eval_streaming.py uses CLI args, not these fields.
evaluation:
  datasets:
    - name: "personachat"
      dataset_id: "bavard/personachat_truecased"
      split: "validation"
      max_samples: 1000
    - name: "light"
      dataset_id: "light_dialog"
      split: "test"
      max_samples: 1000
  metrics: ["perplexity", "bleu", "semantic_retention_f1", "adaptation_speed", "forgetting_rate"]
  cross_session_probes: 50

output_dir: "./outputs"
